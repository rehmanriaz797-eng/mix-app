
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AzkaarTube | Next Gen Video Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#6366f1',
                dark: '#4f46e5'
              },
              surface: '#020617'
            },
            fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
            animation: {
              'marquee': 'marquee 10s linear infinite',
              'glow-pulse': 'glow-pulse 4s ease-in-out infinite',
              'progress': 'progress 2s ease-in-out infinite',
              'heart-burst': 'heart-burst 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards',
              'spin-slow': 'spin 8s linear infinite',
              'dislike-drop': 'dislike-drop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              'glow-pulse': {
                '0%, 100%': { opacity: 0.4 },
                '50%': { opacity: 1 },
              },
              progress: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              },
              'heart-burst': {
                '0%': { transform: 'scale(0.3) translateY(0)', opacity: 0 },
                '15%': { transform: 'scale(1.3) translateY(-10px)', opacity: 1 },
                '100%': { transform: 'scale(2.2) translateY(-100px)', opacity: 0 },
              },
              'dislike-drop': {
                '0%': { transform: 'translateY(0) rotate(0deg)' },
                '30%': { transform: 'translateY(12px) rotate(-20deg)' },
                '100%': { transform: 'translateY(0) rotate(0deg)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body { background: #020617; color: #f8fafc; overflow-x: hidden; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .shadow-glow-brand { box-shadow: 0 0 20px rgba(99,102,241,0.7); }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      
      /* Vertical Snap Scrolling for Shorts */
      .snap-y-mandatory {
        scroll-snap-type: y mandatory;
        overflow-y: scroll;
        height: 100vh;
      }
      .snap-start {
        scroll-snap-align: start;
        scroll-snap-stop: always;
      }
      
      #root { background: #020617; min-height: 100vh; }
      video::-webkit-media-controls { display:none !important; }

      .marquee-container {
        mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.10.1",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3",
    "zustand": "https://esm.sh/zustand@4.5.0?external=react",
    "clsx": "https://esm.sh/clsx@2.1.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.0",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "react-router": "https://esm.sh/react-router@^7.11.0",
    "firebase/": "https://esm.sh/firebase@^12.7.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
